<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&family=Quicksand:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Birthday cake</title>
    <style>
        body {
            background: linear-gradient(135deg, #FFF8E7 0%, #FFD6E0 100%);
            font-family: Arial, Helvetica, sans-serif;
        }

        .cake {
            position: absolute;
            width: 250px;
            height: 200px;
            top: 50%;
            left: 50%;
            margin-top: -70px;
            margin-left: -125px;
        }

        .plate {
            width: 270px;
            height: 110px;
            position: absolute;
            bottom: -10px;
            left: -10px;
            background-color: #ccc;
            border-radius: 50%;
            box-shadow: 0 2px 0 #b3b3b3, 0 4px 0 #b3b3b3, 0 5px 40px rgba(0, 0, 0, 0.5);
        }

        .cake>* {
            position: absolute;
        }

        .layer {
            position: absolute;
            display: block;
            width: 250px;
            height: 100px;
            border-radius: 50%;
            background-color: #553c13;
            box-shadow: 0 2px 0px #6a4b18, 0 4px 0px #33240b, 0 6px 0px #32230b, 0 8px 0px #31230b, 0 10px 0px #30220b, 0 12px 0px #2f220b, 0 14px 0px #2f210a, 0 16px 0px #2e200a, 0 18px 0px #2d200a, 0 20px 0px #2c1f0a, 0 22px 0px #2b1f0a, 0 24px 0px #2a1e09, 0 26px 0px #2a1d09, 0 28px 0px #291d09, 0 30px 0px #281c09;
        }

        .layer-top {
            top: 0px;
        }

        .layer-middle {
            top: 33px;
        }

        .layer-bottom {
            top: 66px;
        }

        .icing {
            top: 2px;
            left: 5px;
            background-color: #f0e4d0;
            width: 240px;
            height: 90px;
            border-radius: 50%;
        }

        .icing:before {
            content: "";
            position: absolute;
            top: 4px;
            right: 5px;
            bottom: 6px;
            left: 5px;
            background-color: #f4ebdc;
            box-shadow: 0 0 4px #f6efe3, 0 0 4px #f6efe3, 0 0 4px #f6efe3;
            border-radius: 50%;
            z-index: 1;
        }

        .drip {
            display: block;
            width: 50px;
            height: 60px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            background-color: #f0e4d0;
        }

        .drip1 {
            top: 53px;
            left: 5px;
            transform: skewY(15deg);
            height: 48px;
            width: 40px;
        }

        .drip2 {
            top: 69px;
            left: 181px;
            transform: skewY(-15deg);
        }

        .drip3 {
            top: 54px;
            left: 90px;
            width: 80px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .candle {
            background-color: #7B020B;
            width: 16px;
            height: 50px;
            border-radius: 8px/4px;
            top: -20px;
            left: 50%;
            margin-left: -8px;
            z-index: 10;
        }

        .candle:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 16px;
            height: 8px;
            border-radius: 50%;
            background-color: #ad030f;
        }

        .flame {
            position: absolute;
            background-color: orange;
            width: 15px;
            height: 35px;
            border-radius: 10px 10px 10px 10px/25px 25px 10px 10px;
            top: -34px;
            left: 50%;
            margin-left: -7.5px;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255, 165, 0, 0.5), 0 0 20px rgba(255, 165, 0, 0.5), 0 0 60px rgba(255, 165, 0, 0.5), 0 0 80px rgba(255, 165, 0, 0.5);
            transform-origin: 50% 90%;
            animation: flicker 1s ease-in-out alternate infinite;
        }

        @keyframes flicker {
            0% {
                transform: skewX(5deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.2), 0 0 20px rgba(255, 165, 0, 0.2), 0 0 60px rgba(255, 165, 0, 0.2), 0 0 80px rgba(255, 165, 0, 0.2);
            }

            25% {
                transform: skewX(-5deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.5), 0 0 20px rgba(255, 165, 0, 0.5), 0 0 60px rgba(255, 165, 0, 0.5), 0 0 80px rgba(255, 165, 0, 0.5);
            }

            50% {
                transform: skewX(10deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.3), 0 0 20px rgba(255, 165, 0, 0.3), 0 0 60px rgba(255, 165, 0, 0.3), 0 0 80px rgba(255, 165, 0, 0.3);
            }

            75% {
                transform: skewX(-10deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.4), 0 0 20px rgba(255, 165, 0, 0.4), 0 0 60px rgba(255, 165, 0, 0.4), 0 0 80px rgba(255, 165, 0, 0.4);
            }

            100% {
                transform: skewX(5deg);
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.5), 0 0 20px rgba(255, 165, 0, 0.5), 0 0 60px rgba(255, 165, 0, 0.5), 0 0 80px rgba(255, 165, 0, 0.5);
            }
        }

        .bdaytxt {
            animation: pop .8s ease-out;

            text-shadow:
                0 0 15px rgba(255, 255, 255, .6);
            position: absolute;
            top: -150%;
            left: -5%;
            text-align: center;
            font-size: 50px;
        }

        .oktxt {
            position: relative;
            top: 250px;
            left: -150px;
            text-align: center;
            font-size: 15px;
            white-space: nowrap;
            font-family: 'Libre Baskerville', serif;
        }

        .monn {
            font-family: 'Libre Baskerville', serif;
            position: relative;
            top: 250px;
            left: -50px;
            text-align: center;
            font-size: 15px;
            white-space: nowrap;
        }

        .nxtbtn {
            position: relative;
            top: 250px;
            left: -50px;
            background-color: #F8B4C4;
            border: 2px solid #FFF8E7;
            height: 60px;
            width: 120px;
            border-radius: 40px;
            transition: background-color 10ms;
            color: #72243E;
            font-size: 18px;
            font-weight: bold;
        }

        .nxtbtn:active {
            background-color: #E89AAF;
            transition: background-color 10ms;
        }

        .balloon {
            position: fixed;
            top: -120px;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: fallBalloon 5s linear forwards;
            z-index: 1000;
        }

        .balloon::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 12px;
            width: 12px;
            height: 18px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            transform: rotate(-15deg);
        }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: 50%;
            width: 8px;
            height: 8px;
            background: var(--balloon-color);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            transform: translateX(-50%) rotate(45deg);
        }

        @keyframes fallBalloon {
            to {
                transform: translateY(120vh) rotate(360deg);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            animation: confettiFall linear forwards;
            z-index: 1000;
        }

        @keyframes confettiFall {
            from {
                transform: translateY(-20px) rotate(0deg);
            }

            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }

        @keyframes pop {

            0% {
                transform: scale(0);
                opacity: 0;
            }

            60% {
                transform: scale(1.2);
                opacity: 1;
            }

            80% {
                transform: scale(0.95);
            }

            100% {
                transform: scale(1);
            }

        }
    </style>
</head>

<body>

    <div class="cake">
        <p class="bdaytxt">HAPPY BIRTHDAYY RAYEEN!!!</p>
        <div class="plate"></div>
        <div class="layer layer-bottom"></div>
        <div class="layer layer-middle"></div>
        <div class="layer layer-top"></div>
        <div class="icing"></div>
        <div class="drip drip1"></div>
        <div class="drip drip2"></div>
        <div class="drip drip3"></div>
        <div class="candle">
            <div class="flame"></div>
            <p class="oktxt">Ei nao cake. Bolbe na bday te cake khaowai ni :3</p>
            <p class="monn">Monn bhore khao</p>
            <button class="nxtbtn">Next</button>
        </div>
        <div id="balloons"></div>
        <div id="confetti"></div>
    </div>
    <script>
        const balloonContainer = document.getElementById("balloons");
        const confettiContainer = document.getElementById("confetti");

        const colors = [
            "#ff4d4d",
            "#4dff88",
            "#4da6ff",
            "#ffd24d",
            "#ff66ff",
            "#66ffff"
        ];
        for (let i = 0; i < 35; i++) {

            const balloon = document.createElement("div");
            balloon.classList.add("balloon");

            balloon.style.left = Math.random() * 100 + "vw";
            const color = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.setProperty("--balloon-color", color);
            balloon.style.background = color;

            balloon.style.animationDuration =
                (4 + Math.random() * 3) + "s";

            balloonContainer.appendChild(balloon);

            setTimeout(() => {
                balloon.remove();
            }, 7000);
        }
        function createConfetti() {

            const piece = document.createElement("div");
            piece.classList.add("confetti");

            piece.style.left = Math.random() * 100 + "vw";

            piece.style.background =
                colors[Math.floor(Math.random() * colors.length)];

            piece.style.animationDuration =
                (3 + Math.random() * 4) + "s";

            piece.style.opacity = Math.random();

            confettiContainer.appendChild(piece);

            setTimeout(() => {
                piece.remove();
            }, 7000);
        }

        setInterval(createConfetti, 120);
    </script>
</body>

</html>
